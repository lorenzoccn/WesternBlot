<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WB Express - Análise de Western Blot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jstat@latest/dist/jstat.min.js"></script>
    
    <style>
        /* Estilos customizados mínimos para scrollbars e inputs */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        .scientific-input {
            border: 1px solid #e5e7eb;
            border-radius: 0.375rem;
            padding: 0.5rem;
            width: 100%;
            text-align: center;
            transition: border-color 0.2s;
        }
        .scientific-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <header class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <h1 class="text-xl font-bold text-gray-900 tracking-tight">Calculadora WesternBlot <span class="text-sm font-normal text-gray-500">| Lorenzo Chaves Costa Novo</span></h1>
            <div class="flex space-x-3">
                <button onclick="exportData()" class="text-sm bg-gray-100 hover:bg-gray-200 text-gray-700 py-2 px-4 rounded transition">Exportar (.txt)</button>
                <label class="text-sm bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded cursor-pointer transition">
                    Importar (.txt)
                    <input type="file" id="fileImport" class="hidden" accept=".txt" onchange="importData(event)">
                </label>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-6">
        <div class="border-b border-gray-200">
            <nav class="-mb-px flex space-x-8" aria-label="Tabs">
                <button id="btn-tab-calc" onclick="switchTab('calc')" class="border-blue-500 text-blue-600 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm transition">Calculadora de Expressão</button>
                <button id="btn-tab-stats" onclick="switchTab('stats')" class="border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm transition">Análise Estatística</button>
            </nav>
        </div>
    </div>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <div id="tab-calc" class="space-y-8 block">
            
            <section class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900 mb-4">Configuração Inicial</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Quantidade de Poços (Amostras)</label>
                        <input type="number" id="numWells" min="1" class="scientific-input" placeholder="Ex: 8">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Qtd. de Proteínas Alvo</label>
                        <input type="number" id="numTargets" min="1" class="scientific-input" placeholder="Ex: 2">
                    </div>
                    <div>
                        <button onclick="generateGrid()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded transition">Gerar Entradas</button>
                    </div>
                </div>
            </section>

            <section id="dataEntrySection" class="hidden bg-white p-6 rounded-lg shadow-sm border border-gray-200 overflow-x-auto">
                <h2 class="text-lg font-semibold text-gray-900 mb-4">Dados Brutos de Densitometria</h2>
                <div id="dataGrid" class="space-y-6"></div>
                <div class="mt-6 border-t border-gray-100 pt-6 flex justify-end">
                    <button onclick="calculateExpression()" class="bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-6 rounded transition">Calcular Expressão Relativa</button>
                </div>
            </section>

            <section id="resultsSection" class="hidden space-y-6">
                <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 overflow-x-auto">
                    <h2 class="text-lg font-semibold text-gray-900 mb-4">Resultados Normalizados</h2>
                    <div id="resultsGrid"></div>
                </div>

                <div id="distributionWarning" class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded text-sm text-blue-800">
                    </div>

                <div class="bg-white rounded-lg shadow-sm border border-gray-200">
                    <button onclick="toggleMath()" class="w-full text-left px-6 py-4 font-semibold text-gray-800 hover:bg-gray-50 flex justify-between items-center">
                        Visualizar Cálculos Passo a Passo
                        <span id="mathIcon" class="transform transition-transform text-xl">+</span>
                    </button>
                    <div id="mathDetails" class="hidden px-6 py-4 border-t border-gray-200 text-sm font-mono text-gray-600 space-y-2 bg-gray-50 overflow-x-auto">
                        </div>
                </div>
            </section>
        </div>


        <div id="tab-stats" class="space-y-8 hidden">
            
            <section class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900 mb-4">Definição de Grupos Experimentais</h2>
                <p class="text-sm text-gray-500 mb-4">Atribua cada poço a um grupo (ex: 'Controle', 'Tratado').</p>
                <div id="groupGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 mb-6">
                    </div>
                <div class="flex items-end space-x-4 border-t border-gray-100 pt-6">
                    <div class="flex-grow max-w-xs">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Analisar Proteína</label>
                        <select id="targetSelector" class="scientific-input">
                            </select>
                    </div>
                    <button onclick="runStatistics()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-6 rounded transition">Rodar Análise & Gerar Gráfico</button>
                </div>
            </section>

            <section id="statsResultSection" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 col-span-1 flex flex-col">
                    <h3 class="text-md font-semibold text-gray-900 mb-4">Resultado Estatístico</h3>
                    <div id="statsOutput" class="flex-grow space-y-4 text-sm">
                        </div>
                    <hr class="my-4 border-gray-200">
                    <h3 class="text-md font-semibold text-gray-900 mb-2">Customizar Gráfico</h3>
                    <div class="space-y-3 text-sm">
                        <div>
                            <label class="block text-gray-700 mb-1">Título do Gráfico</label>
                            <input type="text" id="chartTitleInput" class="scientific-input py-1" onchange="updateChartLayout()">
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-1">Cor das Colunas</label>
                            <input type="color" id="chartColorInput" value="#3b82f6" class="w-full h-8 cursor-pointer rounded border border-gray-300" onchange="updateChartLayout()">
                        </div>
                        <button onclick="exportChart()" class="w-full mt-4 bg-gray-800 hover:bg-gray-900 text-white font-medium py-2 px-4 rounded transition text-sm">Salvar Imagem (PNG)</button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 col-span-1 lg:col-span-2">
                    <div id="plotlyChart" class="w-full h-[400px]"></div>
                </div>
            </section>

        </div>
    </main>

    <script>
        // ================= ESTADO GLOBAL =================
        let appState = {
            numWells: 0,
            numTargets: 0,
            normalizerRaw: [],
            targetsRaw: [], // Array de arrays: [alvoIndex][pocoIndex]
            normalized: [], // Array de arrays: [alvoIndex][pocoIndex]
            groups: [],     // Array de strings mapeando o grupo de cada poço
            chartData: null
        };

        // ================= UI & NAVEGAÇÃO =================
        function switchTab(tabId) {
            document.getElementById('tab-calc').classList.add('hidden');
            document.getElementById('tab-stats').classList.add('hidden');
            document.getElementById('btn-tab-calc').classList.remove('border-blue-500', 'text-blue-600');
            document.getElementById('btn-tab-calc').classList.add('border-transparent', 'text-gray-500');
            document.getElementById('btn-tab-stats').classList.remove('border-blue-500', 'text-blue-600');
            document.getElementById('btn-tab-stats').classList.add('border-transparent', 'text-gray-500');

            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            document.getElementById(`btn-tab-${tabId}`).classList.remove('border-transparent', 'text-gray-500');
            document.getElementById(`btn-tab-${tabId}`).classList.add('border-blue-500', 'text-blue-600');

            if(tabId === 'stats' && appState.normalized.length > 0) {
                renderGroupSetup();
            }
        }

        // ================= ABA 1: LÓGICA =================
        function generateGrid() {
            const wells = parseInt(document.getElementById('numWells').value);
            const targets = parseInt(document.getElementById('numTargets').value);

            if (!wells || !targets || wells <= 0 || targets <= 0) {
                alert("Por favor, insira valores válidos para poços e proteínas alvo.");
                return;
            }

            appState.numWells = wells;
            appState.numTargets = targets;
            
            const grid = document.getElementById('dataGrid');
            grid.innerHTML = '';

            // Helper para gerar linhas
            const createRow = (title, idPrefix) => {
                let html = `<div class="mb-4">
                    <label class="block text-sm font-semibold text-gray-800 mb-2">${title}</label>
                    <div class="flex space-x-2 overflow-x-auto pb-2">`;
                for (let i = 0; i < wells; i++) {
                    html += `<div class="flex-none w-20">
                                <span class="block text-xs text-gray-500 text-center mb-1">Poço ${i+1}</span>
                                <input type="number" id="${idPrefix}_${i}" class="scientific-input text-sm" placeholder="0">
                             </div>`;
                }
                html += `</div></div>`;
                return html;
            };

            // Linha Normalizadora
            grid.innerHTML += createRow('Proteína Normalizadora (Housekeeping)', 'norm');
            
            // Linhas Alvo
            for (let t = 0; t < targets; t++) {
                grid.innerHTML += createRow(`Proteína Alvo ${t+1}`, `target_${t}`);
            }

            document.getElementById('dataEntrySection').classList.remove('hidden');
            document.getElementById('resultsSection').classList.add('hidden');
        }

        function calculateExpression() {
            appState.normalizerRaw = [];
            appState.targetsRaw = [];
            appState.normalized = [];
            let mathLog = [];

            // Capturar Normalizador
            for (let i = 0; i < appState.numWells; i++) {
                let val = parseFloat(document.getElementById(`norm_${i}`).value) || 0;
                if(val === 0) {
                    alert(`O poço ${i+1} da Proteína Normalizadora é zero ou inválido. A divisão por zero não é permitida.`);
                    return;
                }
                appState.normalizerRaw.push(val);
            }

            // Capturar Alvos e Calcular
            for (let t = 0; t < appState.numTargets; t++) {
                let targetVals = [];
                let normVals = [];
                mathLog.push(`<strong class="text-gray-800 block mt-4">>> Calculando Proteína Alvo ${t+1}</strong>`);
                
                for (let i = 0; i < appState.numWells; i++) {
                    let val = parseFloat(document.getElementById(`target_${t}_${i}`).value) || 0;
                    targetVals.push(val);
                    
                    let result = val / appState.normalizerRaw[i];
                    normVals.push(result);
                    
                    mathLog.push(`Poço ${i+1}: Alvo(${val}) / Norm(${appState.normalizerRaw[i]}) = <span class="text-blue-600 font-bold">${result.toFixed(4)}</span>`);
                }
                appState.targetsRaw.push(targetVals);
                appState.normalized.push(normVals);
            }

            renderResults(mathLog);
            assessDistribution();
        }

        function renderResults(mathLog) {
            const resGrid = document.getElementById('resultsGrid');
            resGrid.innerHTML = '';

            let tableHtml = `<table class="min-w-full divide-y divide-gray-200 text-sm">
                <thead class="bg-gray-50"><tr><th class="px-4 py-2 text-left font-medium text-gray-500">Proteína</th>`;
            
            for (let i = 0; i < appState.numWells; i++) tableHtml += `<th class="px-4 py-2 text-center font-medium text-gray-500">P${i+1}</th>`;
            tableHtml += `</tr></thead><tbody class="bg-white divide-y divide-gray-200">`;

            for (let t = 0; t < appState.numTargets; t++) {
                tableHtml += `<tr><td class="px-4 py-2 font-medium text-gray-900">Alvo ${t+1}</td>`;
                for (let i = 0; i < appState.numWells; i++) {
                    tableHtml += `<td class="px-4 py-2 text-center text-gray-700">${appState.normalized[t][i].toFixed(4)}</td>`;
                }
                tableHtml += `</tr>`;
            }
            tableHtml += `</tbody></table>`;
            resGrid.innerHTML = tableHtml;

            document.getElementById('mathDetails').innerHTML = mathLog.join('<br>');
            document.getElementById('resultsSection').classList.remove('hidden');
        }

        function toggleMath() {
            const mathDiv = document.getElementById('mathDetails');
            const icon = document.getElementById('mathIcon');
            if (mathDiv.classList.contains('hidden')) {
                mathDiv.classList.remove('hidden');
                icon.textContent = '-';
            } else {
                mathDiv.classList.add('hidden');
                icon.textContent = '+';
            }
        }

        function assessDistribution() {
            // Usa o coeficiente de assimetria (skewness) da amostra combinada de todos os targets para dar uma dica.
            // Em bioestatística de WB (n pequeno), testes formais perdem poder. Skewness [-1, 1] é uma regra de polegar aceitável.
            let allNormalized = appState.normalized.flat();
            let skew = jStat.skewness(allNormalized);
            
            let div = document.getElementById('distributionWarning');
            let isParametric = (skew >= -1 && skew <= 1);
            
            div.innerHTML = `<strong class="block mb-1">Avaliação Preliminar de Distribuição:</strong>
            O coeficiente de assimetria (Skewness) dos dados normalizados é <b>${skew.toFixed(3)}</b>.<br>
            ${isParametric 
                ? 'Indicação: Os dados parecem ter uma distribuição aproximadamente simétrica. Testes <b>paramétricos</b> (ex: ANOVA, t-test) tendem a ser adequados.' 
                : 'Indicação: Os dados apresentam forte assimetria. Considere utilizar testes <b>não-paramétricos</b> (ex: Kruskal-Wallis, Mann-Whitney) na sua análise.'}`;
        }


        // ================= ABA 2: LÓGICA & PLOTLY =================
        function renderGroupSetup() {
            const groupGrid = document.getElementById('groupGrid');
            const targetSelect = document.getElementById('targetSelector');
            
            // Preserve existing groups if re-rendering, otherwise init with "Grupo A", "Grupo B"
            if (appState.groups.length !== appState.numWells) {
                appState.groups = Array(appState.numWells).fill('Controle');
                // Auto-divide by half for convenience
                for(let i = Math.ceil(appState.numWells/2); i < appState.numWells; i++) {
                    appState.groups[i] = 'Tratamento';
                }
            }

            groupGrid.innerHTML = '';
            for (let i = 0; i < appState.numWells; i++) {
                groupGrid.innerHTML += `
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Poço ${i+1}</label>
                        <input type="text" id="grp_${i}" value="${appState.groups[i]}" class="scientific-input text-sm" placeholder="Nome do Grupo">
                    </div>
                `;
            }

            targetSelect.innerHTML = '';
            for (let t = 0; t < appState.numTargets; t++) {
                targetSelect.innerHTML += `<option value="${t}">Proteína Alvo ${t+1}</option>`;
            }
        }

        function runStatistics() {
            // 1. Atualizar state de grupos
            for (let i = 0; i < appState.numWells; i++) {
                appState.groups[i] = document.getElementById(`grp_${i}`).value.trim() || `Grupo-${i}`;
            }

            const targetIndex = parseInt(document.getElementById('targetSelector').value);
            const data = appState.normalized[targetIndex];
            
            // 2. Agrupar dados
            let groupedData = {};
            for (let i = 0; i < appState.numWells; i++) {
                let g = appState.groups[i];
                if (!groupedData[g]) groupedData[g] = [];
                groupedData[g].push(data[i]);
            }

            const groupNames = Object.keys(groupedData);
            if (groupNames.length < 2) {
                alert("Para análises estatísticas, você precisa de pelo menos 2 grupos experimentais distintos.");
                return;
            }

            // 3. Calcular Estatísticas Descritivas e ANOVA via jStat
            let arraysForAnova = groupNames.map(g => groupedData[g]);
            let pValue = 1;
            let fScore = 0;
            
            try {
                pValue = jStat.anovaftest(...arraysForAnova);
                fScore = jStat.anovafscore(...arraysForAnova);
            } catch(e) {
                console.error("Erro na ANOVA", e);
                pValue = NaN;
            }

            let means = [];
            let sems = []; // Standard Error of Mean (SD / sqrt(N))

            let statsHtml = `
                <div class="mb-3">
                    <span class="font-bold text-gray-700 block">ANOVA One-Way (Paramétrico)</span>
                    <span class="text-gray-600">F-value: ${isNaN(fScore) ? 'N/A' : fScore.toFixed(3)}</span><br>
                    <span class="text-gray-600">p-value: <b class="${pValue < 0.05 ? 'text-red-600' : 'text-gray-900'}">${isNaN(pValue) ? 'N/A' : (pValue < 0.001 ? '< 0.001' : pValue.toFixed(4))}</b></span>
                    ${pValue < 0.05 ? '<span class="text-red-600 text-xs block mt-1">* Diferença estatisticamente significativa (p < 0.05)</span>' : ''}
                </div>
                <table class="w-full text-left text-xs text-gray-600 mt-2">
                    <thead><tr class="border-b"><th class="pb-1">Grupo</th><th class="pb-1">Média</th><th class="pb-1">EPM</th><th class="pb-1">n</th></tr></thead>
                    <tbody>
            `;

            for (let g of groupNames) {
                let arr = groupedData[g];
                let mean = jStat.mean(arr);
                let sd = jStat.stdev(arr, true); // true = sample standard deviation
                let sem = sd / Math.sqrt(arr.length);
                means.push(mean);
                sems.push(sem);
                
                statsHtml += `<tr><td class="py-1 font-medium">${g}</td><td>${mean.toFixed(3)}</td><td>±${sem.toFixed(3)}</td><td>${arr.length}</td></tr>`;
            }
            statsHtml += `</tbody></table>`;
            
            document.getElementById('statsOutput').innerHTML = statsHtml;
            document.getElementById('statsResultSection').classList.remove('hidden');

            // 4. Renderizar Gráfico no Plotly
            appState.chartData = {
                x: groupNames,
                y: means,
                error_y: {
                    type: 'data',
                    array: sems,
                    visible: true,
                    color: '#1f2937',
                    thickness: 1.5,
                    width: 5
                }
            };
            
            document.getElementById('chartTitleInput').value = `Expressão Relativa - Alvo ${targetIndex+1}`;
            renderChart();
        }

        function renderChart() {
            if(!appState.chartData) return;
            
            const title = document.getElementById('chartTitleInput').value;
            const color = document.getElementById('chartColorInput').value;

            const trace1 = {
                x: appState.chartData.x,
                y: appState.chartData.y,
                name: 'Expressão Relativa',
                type: 'bar',
                error_y: appState.chartData.error_y,
                marker: {
                    color: color,
                    line: { color: '#1f2937', width: 1 }
                }
            };

            const layout = {
                title: { text: title, font: { family: 'Arial, sans-serif', size: 18 } },
                xaxis: { title: 'Grupos Experimentais', tickfont: { size: 14 } },
                yaxis: { title: 'Expressão Relativa (Alvo / Normalizador)', zeroline: true },
                margin: { l: 60, r: 20, t: 60, b: 60 },
                plot_bgcolor: 'rgba(255,255,255,1)',
                paper_bgcolor: 'rgba(255,255,255,1)'
            };

            const config = { responsive: true, displayModeBar: false };

            Plotly.newPlot('plotlyChart', [trace1], layout, config);
        }

        function updateChartLayout() {
            renderChart();
        }

        function exportChart() {
            Plotly.downloadImage('plotlyChart', {format: 'png', width: 800, height: 600, filename: 'wb_expression_chart'});
        }


        // ================= SISTEMA DE SALVAMENTO (I/O) =================
        function exportData() {
            // Captura os dados da tela caso não tenham sido processados ainda
            if(appState.numWells > 0 && appState.numTargets > 0) {
                 // Salva o estado atual
                const dataStr = JSON.stringify(appState, null, 2);
                const blob = new Blob([dataStr], { type: "text/plain" });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = `wb_experiment_${new Date().toISOString().slice(0,10)}.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } else {
                alert("Não há dados configurados para exportar.");
            }
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedState = JSON.parse(e.target.result);
                    
                    // Validação simples
                    if(importedState.numWells !== undefined && importedState.numTargets !== undefined) {
                        appState = importedState;
                        
                        // Repovoar UI - Aba 1
                        document.getElementById('numWells').value = appState.numWells;
                        document.getElementById('numTargets').value = appState.numTargets;
                        generateGrid();
                        
                        // Inserir valores brutos
                        for(let i=0; i < appState.numWells; i++) {
                            document.getElementById(`norm_${i}`).value = appState.normalizerRaw[i];
                        }
                        for(let t=0; t < appState.numTargets; t++) {
                            for(let i=0; i < appState.numWells; i++) {
                                document.getElementById(`target_${t}_${i}`).value = appState.targetsRaw[t][i];
                            }
                        }
                        
                        // Calcular automaticamente para gerar resultados
                        calculateExpression();

                        // Notificar
                        alert("Dados importados com sucesso!");
                        event.target.value = ''; // reseta o input
                    } else {
                        throw new Error("Formato inválido");
                    }
                } catch(err) {
                    alert("Erro ao ler o arquivo. Certifique-se de que é um arquivo .txt gerado por este aplicativo.");
                    console.error(err);
                }
            };
            reader.readAsText(file);
        }

        // Inicialização padrão: abrir Aba 1
        switchTab('calc');
    </script>
</body>
</html>
